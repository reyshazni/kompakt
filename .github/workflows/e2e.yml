name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (K8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ["1.30", "1.31"]
        include:
          - k8s-version: "1.30"
            kind-image: kindest/node:v1.30.0
          - k8s-version: "1.31"
            kind-image: kindest/node:v1.31.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: ${{ matrix.kind-image }}
          cluster_name: kompakt-dev

      - name: Setup and deploy
        run: |
          IMG=kompakt:e2e CLUSTER_NAME=kompakt-dev hack/e2e-setup.sh

      - name: Run e2e tests
        run: go test -v -count=1 -timeout=5m ./test/e2e/...

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Controller logs ==="
          kubectl -n kompakt-system logs -l app.kubernetes.io/name=kompakt --tail=100 || true
          echo "=== Pod status ==="
          kubectl get pods --all-namespaces || true
          echo "=== Events ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -30 || true
