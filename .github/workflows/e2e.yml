name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (K8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version: ["1.30", "1.31"]
        include:
          - k8s-version: "1.30"
            kind-image: kindest/node:v1.30.0
          - k8s-version: "1.31"
            kind-image: kindest/node:v1.31.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: ${{ matrix.kind-image }}
          cluster_name: kompakt-e2e

      - name: Build image
        run: |
          docker build -t kompakt:e2e .
          kind load docker-image kompakt:e2e --name kompakt-e2e

      - name: Install CRDs
        run: kubectl apply -f config/crd/bases/

      - name: Deploy with kustomize
        run: |
          cd config/manager && kustomize edit set image ghcr.io/reyshazni/kompakt=kompakt:e2e
          kustomize build config/default | kubectl apply -f -
        working-directory: ${{ github.workspace }}

      - name: Wait for controller
        run: |
          kubectl -n kompakt-system wait --for=condition=available deployment/kompakt-controller --timeout=60s || \
          kubectl -n kompakt-system describe pods

      - name: Run e2e tests
        run: go test -v -count=1 -timeout=10m ./test/e2e/...
        env:
          KUBECONFIG: ${{ env.KUBECONFIG }}

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Controller logs ==="
          kubectl -n kompakt-system logs -l app.kubernetes.io/name=kompakt --tail=100 || true
          echo "=== Pod status ==="
          kubectl get pods --all-namespaces || true
          echo "=== Events ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' | tail -30 || true
