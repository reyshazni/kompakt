name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run go fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files not formatted:"
            echo "$out"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62

      - name: Run yamllint
        run: |
          pip install -q yamllint
          yamllint -c .yamllint.yml config/ charts/kompakt/Chart.yaml charts/kompakt/values.yaml .github/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run tests
        run: go test -race -coverprofile=cover.out $(go list ./... | grep -v /test/e2e)

      - name: Check coverage
        run: go tool cover -func=cover.out

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/kompakt/

      - name: Template chart
        run: helm template kompakt charts/kompakt/ -n kompakt-system > /dev/null

  kustomize:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Build default overlay
        run: kustomize build config/default > /dev/null

  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binary
        run: CGO_ENABLED=0 go build -o bin/manager ./cmd/manager

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: kompakt:ci-${{ github.sha }}
