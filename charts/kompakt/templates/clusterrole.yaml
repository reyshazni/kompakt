apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kompakt.fullname" . }}
  labels:
    {{- include "kompakt.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  - apiGroups: [packer.kompakt.io]
    resources: [packingprofiles]
    verbs: [get, list, watch]
  - apiGroups: [packer.kompakt.io]
    resources: [packingprofiles/status]
    verbs: [update, patch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [configmaps]
    resourceNames: [cluster-autoscaler-status]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kompakt.fullname" . }}
  labels:
    {{- include "kompakt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kompakt.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kompakt.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
