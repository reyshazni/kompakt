replicaCount: 1

image:
  repository: ghcr.io/reyshazni/kompakt
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

webhook:
  failurePolicy: Ignore
  timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

metrics:
  enabled: true
  port: 8080

leaderElection:
  enabled: true
