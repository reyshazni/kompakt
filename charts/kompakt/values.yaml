replicaCount: 1

image:
  repository: ghcr.io/reyshazni/kompakt
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

webhook:
  failurePolicy: Ignore
  timeoutSeconds: 5

# Resource defaults target clusters with up to ~100 concurrent gated pods.
# See docs/guides/resource-sizing.md for data-backed methodology.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

metrics:
  enabled: true
  port: 8080

leaderElection:
  enabled: true
