---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.0
  name: packingprofiles.packer.kompakt.io
spec:
  group: packer.kompakt.io
  names:
    kind: PackingProfile
    listKind: PackingProfileList
    plural: packingprofiles
    shortNames:
    - pp
    singular: packingprofile
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.demandSource.type
      name: Demand
      type: string
    - jsonPath: .spec.rules[*].name
      name: Rules
      type: string
    - jsonPath: .status.activeGates
      name: Active Gates
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PackingProfile is the Schema for the packingprofiles API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: "PackingProfileSpec defines the coordination behavior for
              a class of workloads.\nPods opt in to a profile by setting the label:\n\n\tpacker.kompakt.io/packing-profile:
              <profile-name>\n\nThe webhook validates that the referenced profile
              exists at pod creation time.\nIf the profile does not exist, the pod
              is rejected."
            properties:
              capacitySource:
                description: CapacitySource defines how to determine available and
                  in-flight node capacity.
                properties:
                  label:
                    description: |-
                      Label is the node label key holding the total capacity value.
                      Used when Type is NodeLabel.
                    type: string
                  perDeviceCount:
                    description: |-
                      PerDeviceCount specifies a node label whose value indicates the number
                      of devices on the node. Used for fractional GPU calculations.
                    properties:
                      label:
                        description: Label is the node label key.
                        type: string
                    required:
                    - label
                    type: object
                  resources:
                    description: |-
                      Resources lists the resource names to read from node allocatable.
                      Used when Type is NodeAllocatable.
                    items:
                      type: string
                    type: array
                  type:
                    description: Type is the capacity detection method.
                    enum:
                    - NodeAllocatable
                    - NodeLabel
                    type: string
                required:
                - type
                type: object
              demandSource:
                description: DemandSource defines how to extract resource demand from
                  matched pods.
                properties:
                  annotation:
                    description: |-
                      Annotation is the annotation key holding the demand value.
                      Used when Type is Annotation.
                    type: string
                  resources:
                    description: |-
                      Resources lists the resource names to extract from container requests.
                      Used when Type is ResourceRequest.
                    items:
                      type: string
                    type: array
                  type:
                    description: Type is the demand extraction method.
                    enum:
                    - ResourceRequest
                    - Annotation
                    type: string
                  unit:
                    description: |-
                      Unit is the unit of the annotation value (e.g., "MiB", "cores").
                      Used when Type is Annotation.
                    type: string
                required:
                - type
                type: object
              readinessSignal:
                description: ReadinessSignal defines when a node is considered ready
                  to receive gated pods.
                properties:
                  nodeConditions:
                    description: NodeConditions lists the conditions that must be
                      true on the node.
                    items:
                      description: NodeConditionRequirement specifies a required node
                        condition.
                      properties:
                        status:
                          description: Status is the required condition status (e.g.,
                            "True").
                          type: string
                        type:
                          description: Type is the node condition type (e.g., "Ready").
                          type: string
                      required:
                      - status
                      - type
                      type: object
                    type: array
                  requiredLabels:
                    description: RequiredLabels lists node labels that must be present.
                    items:
                      type: string
                    type: array
                type: object
              reservationTimeout:
                default: 3m
                description: |-
                  ReservationTimeout is the maximum duration a pod's capacity reservation
                  is held before the gate is released unconditionally.
                type: string
              rules:
                description: Rules is the ordered list of rule plugins to execute
                  for matched pods.
                items:
                  description: RuleRef references a rule plugin by name.
                  properties:
                    name:
                      description: Name is the rule plugin name.
                      enum:
                      - BinPackOnInflightCapacity
                      - WaitForImagePrePull
                      - WaitForMIGProfile
                      - WaitForCoLocation
                      type: string
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
            required:
            - capacitySource
            - demandSource
            - readinessSignal
            - rules
            type: object
          status:
            description: PackingProfileStatus defines the observed state of PackingProfile.
            properties:
              activeGates:
                description: ActiveGates is the number of pods currently gated by
                  this profile.
                format: int32
                type: integer
              activeReservations:
                description: ActiveReservations is the number of capacity reservations
                  held.
                format: int32
                type: integer
              conditions:
                description: Conditions represent the latest available observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
