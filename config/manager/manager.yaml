apiVersion: apps/v1
kind: Deployment
metadata:
  name: kompakt-controller
  namespace: kompakt-system
  labels:
    app.kubernetes.io/name: kompakt
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kompakt
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kompakt
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: kompakt-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/reyshazni/kompakt:latest
          args:
            - --leader-elect
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: cert-dir
              mountPath: /tmp/k8s-webhook-server/serving-certs
      volumes:
        - name: cert-dir
          emptyDir: {}
      terminationGracePeriodSeconds: 10
