site_name: Kompakt
site_url: https://reyshazni.github.io/kompakt
site_description: Keep your cluster compact. Kubernetes admission-time coordinator that prevents autoscaler over-provisioning.
repo_name: reyshazni/kompakt
repo_url: https://github.com/reyshazni/kompakt
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Your First PackingProfile: getting-started/first-profile.md
    - Uninstall: getting-started/uninstall.md
  - Concepts:
    - How It Works: concepts/how-it-works.md
    - PackingProfiles: concepts/packing-profiles.md
    - Node Ledger: concepts/node-ledger.md
    - Rule Plugins: concepts/rule-plugins.md
    - In-flight Node Detection: concepts/inflight-detection.md
  - Guides:
    - CPU/Memory Packing: guides/cpu-memory-packing.md
    - GPU Packing: guides/gpu-packing.md
    - Scale-from-zero GPU: guides/scale-from-zero-gpu.md
    - Multi-cloud Setup: guides/multi-cloud.md
    - Observability: guides/observability.md
    - Troubleshooting: guides/troubleshooting.md
  - Reference:
    - PackingProfile API: reference/api-reference.md
    - Prometheus Metrics: reference/metrics.md
    - RBAC Requirements: reference/rbac.md
    - Compatibility Matrix: reference/compatibility.md
  - Contributing:
    - Development Setup: contributing/development.md
    - Architecture: contributing/architecture.md
